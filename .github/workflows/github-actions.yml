# Placeholder — full pipeline built in Phase 9 (Step 35)
# See docs/HOW_TO_USE.md for CI/CD setup instructions
name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Smoke Tests
        run: mvn test -Dtest=SmokeTestRunner -Dbrowser=headless